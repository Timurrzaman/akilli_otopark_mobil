name: akilli_otopark
description: Akıllı Otopark Mobil Uygulaması
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0              # Django API istekleri
  provider: ^6.1.1          # State management
  shared_preferences: ^2.2.2 # Sunucu adresi kaydetmek için
  intl: ^0.19.0             # Tarih/saat formatlama

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1" # Bunu ekle

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png" # Logonu burada tanımlıyoruz
  adaptive_icon_background: "#0D0F14" # Logonun arka plan rengi (Koyu Tema)
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png